name: Claude Code Warmup

# 目标：把 Claude 订阅的 5 小时使用窗口锚定在荷兰时间每天 07:00 开启。
# 原理：07:00 用 Claude CLI 发一次极小调用，订阅窗口即从此刻开始计时。
#
# 时区说明（GitHub cron 只认 UTC）：
# - 荷兰夏令时 CEST=UTC+2: 07:00 本地 = 05:00 UTC
# - 荷兰冬令时 CET =UTC+1: 07:00 本地 = 06:00 UTC
# - 挂两个 cron，并在脚本里用 Europe/Amsterdam 校验“当地是否 06 点”，
#   只有匹配才真正热身，自动适配夏/冬令时切换。
# - cron 常延迟 5~15 分钟，故 06:50 触发，保证 07:00 前窗口已开。

on:
  schedule:
    - cron: '50 4 * * *'   # 夏令时 04:50 UTC ≈ 荷兰 06:50
    - cron: '50 5 * * *'   # 冬令时 05:50 UTC ≈ 荷兰 06:50
  workflow_dispatch: {}

concurrency:
  group: claude-warmup
  cancel-in-progress: true

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check local hour is 06 (Europe/Amsterdam)
        id: gate
        run: |
          LOCAL_HOUR=$(TZ="Europe/Amsterdam" date +%H)
          echo "Amsterdam local hour: $LOCAL_HOUR"
          if [ "$LOCAL_HOUR" = "06" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 06:xx Amsterdam time, skipping."
          fi

      - name: Validate configuration
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "CLAUDE_OAUTH_TOKEN secret is not set."
            echo "Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install Claude Code
        if: steps.gate.outputs.run == 'true'
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        if: steps.gate.outputs.run == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          output_file="$(mktemp)"
          set +e
          claude -p "hi" --model haiku --no-session-persistence >"$output_file" 2>&1
          status=$?
          set -e
          cat "$output_file"

          if [ $status -eq 0 ]; then
            echo "Claude warmup request succeeded."
            echo "✓ Warmup complete"
            exit 0
          fi

          if grep -Eiq "expired|unauthorized|invalid token|authentication|auth failed|login required|not logged in" "$output_file"; then
            echo "Claude token appears invalid or expired."
            echo "Run 'claude setup-token' locally and update the CLAUDE_OAUTH_TOKEN GitHub secret."
            exit 1
          fi

          if grep -qi "rate limit" "$output_file"; then
            echo "Claude reported a rate limit; treating as warmup success."
            echo "✓ Warmup complete"
            exit 0
          fi

          echo "Claude warmup failed with an unexpected error."
          exit $status
