name: Claude Warmup (one-shot)

# 一次性云端触发：在指定 UTC 时间跑一次，重新锚定 Claude 5 小时窗口。
# 与每日 warmup.yml 不同，这里没有“早上6点”时间门，cron 到点即执行。
# 用完后由助手删除本文件（或清空 cron）。
#
# 当前设定：今晚荷兰时间 19:20 (CEST=UTC+2) = 17:20 UTC

on:
  schedule:
    - cron: '20 17 30 6 *'   # 2026-06-30 17:20 UTC = 荷兰 19:20
  workflow_dispatch: {}

concurrency:
  group: claude-warmup
  cancel-in-progress: true

jobs:
  warmup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate configuration
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          if [ -z "${CLAUDE_CODE_OAUTH_TOKEN}" ]; then
            echo "CLAUDE_OAUTH_TOKEN secret is not set."
            exit 1
          fi

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Ping Claude to anchor 5-hour window
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
        run: |
          mkdir -p ~/.claude
          echo '{"hasCompletedOnboarding":true}' > ~/.claude.json
          output_file="$(mktemp)"
          set +e
          claude -p "hi" --model haiku --no-session-persistence >"$output_file" 2>&1
          status=$?
          set -e
          cat "$output_file"

          if [ $status -eq 0 ]; then
            echo "✓ Warmup complete"
            exit 0
          fi
          if grep -qi "rate limit" "$output_file"; then
            echo "Rate limit; treating as success."
            echo "✓ Warmup complete"
            exit 0
          fi
          echo "Claude warmup failed."
          exit $status
